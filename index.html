<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QGK – Leitor de Chave NF-e</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f4f5f7;
  --surface: #ffffff;
  --surface2: #f9fafb;
  --border: #e5e7eb;
  --border2: #d1d5db;
  --text: #111827;
  --text2: #6b7280;
  --text3: #9ca3af;
  --accent: #111827;
  --accent2: #374151;
  --green: #059669;
  --green-bg: #ecfdf5;
  --yellow: #d97706;
  --yellow-bg:#fffbeb;
  --radius: 12px;
  --shadow-md:0 4px 16px rgba(0,0,0,0.08);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 20px; }
.container { max-width: 440px; margin: 0 auto; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 28px 24px; box-shadow: var(--shadow-md); }

.logo-header { display: flex; align-items: center; justify-content: center; gap: 14px; margin-bottom: 24px; padding-bottom: 20px; border-bottom: 1px solid var(--border); }
.logo-hex { width: 44px; height: 44px; flex-shrink: 0; }
.logo-text-block { display: flex; flex-direction: column; align-items: flex-start; line-height: 1; }
.logo-qgk { font-family: 'Black Ops One', cursive; font-size: 24px; letter-spacing: 4px; color: #111827; }
.logo-sub { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 2px; color: var(--text3); text-transform: uppercase; margin-top: 3px; }

button { font-family: 'DM Sans', sans-serif; cursor: pointer; border: none; border-radius: 8px; font-weight: 600; letter-spacing: 0.3px; transition: all 0.18s; display: flex; align-items: center; justify-content: center; gap: 8px; }
.btn-primary { width: 100%; padding: 13px; background: var(--accent); color: white; font-size: 14px; margin-bottom: 8px; }
.btn-primary:hover { background: var(--accent2); }
.btn-secondary { width: 100%; padding: 12px; background: var(--surface2); color: var(--text2); font-size: 13px; margin-bottom: 8px; border: 1.5px solid var(--border2); }
.btn-secondary:hover { background: var(--border); color: var(--text); }
.btn-close-camera { width: 100%; padding: 9px; margin-top: 8px; background: var(--surface2); color: var(--text2); font-size: 12px; border: 1.5px solid var(--border2); border-radius: 8px; }
.btn-close-camera:hover { background: #fef2f2; color: #dc2626; border-color: #fecaca; }

.camera-container { margin-bottom: 14px; position: relative; display: none; }
#video { width: 100%; border-radius: 8px; border: 2px solid var(--border2); display: block; background: #000; }
.camera-overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 90%; height: 40%; border: 2px solid var(--accent); border-radius: 4px; box-shadow: 0 0 0 9999px rgba(0,0,0,0.45); pointer-events: none; }
.camera-hint { position: absolute; bottom: 44px; left: 0; right: 0; text-align: center; color: white; font-size: 11px; font-family: 'DM Mono', monospace; letter-spacing: 1px; padding: 5px; background: rgba(0,0,0,0.55); }

.barcode-input-container { display: none; margin-bottom: 14px; }
.barcode-input-container.show { display: block; }
.barcode-display { width: 100%; padding: 12px 14px; border: 2px solid var(--accent); border-radius: 8px; font-size: 15px; font-weight: 700; text-align: center; background: var(--surface2); color: var(--accent); font-family: 'DM Mono', monospace; margin-bottom: 10px; letter-spacing: 1px; }
.barcode-hint { text-align: center; color: var(--text2); font-size: 11px; font-family: 'DM Mono', monospace; letter-spacing: 1px; padding: 10px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
.hidden-barcode-input { position: absolute; left: -9999px; width: 1px; height: 1px; }

.engine-badge { display: block; font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 1px; padding: 5px 12px; border-radius: 20px; margin-bottom: 14px; width: 100%; text-align: center; font-weight: 500; }
.engine-badge.native { background: var(--green-bg); color: var(--green); border: 1px solid #a7f3d0; }
.engine-badge.fallback { background: var(--yellow-bg); color: var(--yellow); border: 1px solid #fde68a; }

.resultado-section { margin-top: 8px; }
.chave-card { background: var(--surface2); border: 1.5px solid var(--border2); border-left: 4px solid var(--accent); border-radius: 8px; padding: 14px; margin-bottom: 10px; animation: slideDown 0.25s ease; }
@keyframes slideDown { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }
.chave-card.copiado { border-left-color: var(--green); background: var(--green-bg); }
.chave-numero { font-family: 'DM Mono', monospace; font-size: 15px; font-weight: 700; color: var(--text); word-break: break-all; line-height: 1.4; margin-bottom: 6px; letter-spacing: 0.5px; }
.chave-meta { display: flex; justify-content: space-between; align-items: center; }
.chave-len { font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; }
.btn-copiar { padding: 6px 14px; font-size: 12px; background: var(--accent); color: white; }
.btn-copiar:hover { background: var(--accent2); }
.btn-copiar.ok { background: var(--green); }

.empty-state { text-align: center; color: var(--text3); padding: 30px 20px; font-size: 13px; font-family: 'DM Mono', monospace; }
.section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.section-header h2 { font-size: 12px; font-weight: 600; color: var(--text2); letter-spacing: 0.5px; text-transform: uppercase; }
.btn-limpar-lista { background: none; border: none; color: var(--text3); font-size: 11px; font-family: 'DM Mono', monospace; text-decoration: underline; cursor: pointer; padding: 4px; }
.lista-chaves { max-height: 340px; overflow-y: auto; padding-right: 2px; }
.lista-chaves::-webkit-scrollbar { width: 4px; }
.lista-chaves::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

@media (max-width: 480px) { body { padding: 12px; } .container { padding: 20px 16px; } }
</style>
</head>
<body>

<div class="container">
  <div class="logo-header">
    <svg class="logo-hex" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <polygon points="50,4 92,27 92,73 50,96 8,73 8,27" fill="#2e3d1a" stroke="#4a5c2f" stroke-width="2"/>
      <polygon points="50,16 80,33 80,67 50,84 20,67 20,33" fill="none" stroke="#4a5c2f" stroke-width="1" opacity="0.5"/>
      <text x="50" y="62" text-anchor="middle" font-family="Black Ops One, cursive" font-size="26" fill="#7fff00" letter-spacing="1">QGK</text>
    </svg>
    <div class="logo-text-block">
      <span class="logo-qgk">QGK</span>
      <span class="logo-sub">Leitor de Chave NF-e</span>
    </div>
  </div>

  <div id="engineBadge" class="engine-badge">⬡ VERIFICANDO SUPORTE...</div>

  <button id="btnEscanear" class="btn-primary">📷 Escanear com Câmera</button>
  <button id="btnLeitorCodigo" class="btn-secondary">🔍 Usar Leitor de Código de Barras</button>

  <div id="barcodeInputContainer" class="barcode-input-container">
    <input type="text" id="barcodeDisplay" class="barcode-display" placeholder="// AGUARDANDO CÓDIGO //" readonly>
    <div class="barcode-hint">⬡ APONTE O LEITOR PARA O CÓDIGO DE BARRAS</div>
    <input type="text" id="barcodeInput" class="hidden-barcode-input" autocomplete="off">
    <button id="btnFecharLeitor" class="btn-close-camera">✕ FECHAR LEITOR</button>
  </div>

  <div id="cameraContainer" class="camera-container">
    <video id="video" playsinline></video>
    <div class="camera-overlay"></div>
    <div class="camera-hint" id="cameraHint">⬡ POSICIONE O CÓDIGO DENTRO DA ÁREA</div>
    <button id="btnFecharCamera" class="btn-close-camera">✕ FECHAR CÂMERA</button>
  </div>

  <div class="resultado-section">
    <div class="section-header">
      <h2>Chaves lidas nesta sessão</h2>
      <button id="btnLimparLista" class="btn-limpar-lista">limpar lista</button>
    </div>
    <div id="listaChaves" class="lista-chaves">
      <p class="empty-state">// nenhuma chave lida ainda</p>
    </div>
  </div>
</div>

<script src="https://unpkg.com/@zxing/library@latest/umd/index.min.js"></script>
<script>
// ─── DOM ───
const btnEscanear      = document.getElementById('btnEscanear');
const btnLeitorCodigo  = document.getElementById('btnLeitorCodigo');
const cameraContainer  = document.getElementById('cameraContainer');
const video            = document.getElementById('video');
const cameraHint       = document.getElementById('cameraHint');
const engineBadge      = document.getElementById('engineBadge');
const barcodeInputContainer = document.getElementById('barcodeInputContainer');
const barcodeInput     = document.getElementById('barcodeInput');
const barcodeDisplay   = document.getElementById('barcodeDisplay');
const listaChaves      = document.getElementById('listaChaves');

// ─── ESTADO (só em memória, nada é salvo) ───
let chavesLidas = [];       // [{codigo, hora}]
let scannerAtivo = false;
let stream = null;
let modoLeitor = false;
let rafId = null;
let zxingReader = null;
let loopPausado = false;
let cooldownCodigo = '';
let cooldownTimer = null;

const MIN_LEN = 20;
const PAUSA_LEITOR = 200;
let bufferLeitor = '';
let timerLeitor = null;
let ultimoKeyTime = 0;

btnEscanear.addEventListener('click', iniciarScanner);
btnLeitorCodigo.addEventListener('click', iniciarLeitorCodigo);
document.getElementById('btnFecharCamera').addEventListener('click', pararScanner);
document.getElementById('btnFecharLeitor').addEventListener('click', pararLeitorCodigo);
document.getElementById('btnLimparLista').addEventListener('click', () => {
  chavesLidas = []; renderLista();
});

document.addEventListener('keydown', function(e) {
  if (modoLeitor) capturarTeclaLeitor(e);
});

// ═══════════════════════
// ENGINE BADGE
// ═══════════════════════
const NATIVE_SUPPORTED = ('BarcodeDetector' in window);

function setEngineBadge(txt, ok) {
  engineBadge.textContent = txt;
  engineBadge.className = 'engine-badge ' + (ok ? 'native' : 'fallback');
}

function iniciarEngineBadge() {
  if (NATIVE_SUPPORTED) {
    BarcodeDetector.getSupportedFormats().then(fmts => {
      const temCode128 = fmts.includes('code_128');
      setEngineBadge('⬡ NATIVE BARCODE API' + (temCode128 ? ' · CODE128 ✓' : ''), true);
    }).catch(() => setEngineBadge('⬡ NATIVE BARCODE API', true));
  } else {
    setEngineBadge('⬡ ZXING JS (FALLBACK)', false);
  }
}
iniciarEngineBadge();

// ═══════════════════════
// CÂMERA
// ═══════════════════════
async function iniciarScanner() {
  scannerAtivo = true;
  loopPausado = false;
  cameraContainer.style.display = 'block';
  btnEscanear.style.display = 'none';
  btnLeitorCodigo.style.display = 'none';
  cameraHint.textContent = '⬡ INICIANDO...';
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' }, width: { ideal: 1920 }, height: { ideal: 1080 } }
    });
    video.srcObject = stream;
    await video.play();
    cameraHint.textContent = '⬡ POSICIONE O CÓDIGO DENTRO DA ÁREA';
    if (NATIVE_SUPPORTED) iniciarBarcodeDetectorNativo();
    else await iniciarZXing();
  } catch(err) {
    console.error('[CAMERA]', err);
    alert('Erro ao acessar a câmera. Verifique as permissões.');
    pararScanner();
  }
}

function pararScanner() {
  scannerAtivo = false;
  loopPausado = false;
  clearTimeout(cooldownTimer);
  cooldownCodigo = '';
  if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
  if (zxingReader) { try { zxingReader.reset(); } catch(e) {} zxingReader = null; }
  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
  cameraContainer.style.display = 'none';
  btnEscanear.style.display = 'flex';
  btnLeitorCodigo.style.display = 'flex';
}

function retomarLoop(codigoLido) {
  loopPausado = true;
  cooldownCodigo = codigoLido;
  cameraHint.textContent = '⬡ PRÓXIMA LEITURA EM INSTANTES...';
  clearTimeout(cooldownTimer);
  cooldownTimer = setTimeout(() => {
    if (!scannerAtivo) return;
    cooldownCodigo = '';
    loopPausado = false;
    cameraHint.textContent = '⬡ POSICIONE O PRÓXIMO CÓDIGO';
    if (NATIVE_SUPPORTED) iniciarBarcodeDetectorNativo();
    else iniciarZXing();
  }, 1500);
}

// ═══════════════════════
// ENGINE 1 – BarcodeDetector nativo
// ═══════════════════════
function iniciarBarcodeDetectorNativo() {
  const detector = new BarcodeDetector({ formats: ['code_128','itf','ean_13','ean_8','code_39','qr_code'] });
  let ultimoCodigo = '';
  let contagemVotos = 0;
  const MIN_VOTOS = 2;

  async function loop() {
    if (!scannerAtivo || loopPausado) return;
    if (video.readyState === video.HAVE_ENOUGH_DATA) {
      try {
        const barcodes = await detector.detect(video);
        if (barcodes.length > 0) {
          const melhor = barcodes.reduce((a, b) => a.rawValue.length >= b.rawValue.length ? a : b);
          const limpo = melhor.rawValue.replace(/\D/g, '');
          if (limpo === cooldownCodigo) { rafId = requestAnimationFrame(loop); return; }
          if (limpo.length >= MIN_LEN) {
            if (limpo === ultimoCodigo) { contagemVotos++; } else { ultimoCodigo = limpo; contagemVotos = 1; }
            cameraHint.textContent = `⬡ ${limpo.length} DÍGITOS · ${contagemVotos}/${MIN_VOTOS}`;
            if (contagemVotos >= MIN_VOTOS) { registrarChave(limpo); retomarLoop(limpo); return; }
          } else { cameraHint.textContent = '⬡ CÓDIGO DETECTADO – APROXIME MAIS'; }
        } else { cameraHint.textContent = '⬡ POSICIONE O CÓDIGO DENTRO DA ÁREA'; }
      } catch(e) {}
    }
    rafId = requestAnimationFrame(loop);
  }
  rafId = requestAnimationFrame(loop);
}

// ═══════════════════════
// ENGINE 2 – ZXing (fallback)
// ═══════════════════════
async function iniciarZXing() {
  if (typeof ZXing === 'undefined') {
    alert('ZXing não carregou. Verifique a conexão.'); pararScanner(); return;
  }
  const hints = new Map();
  hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, [
    ZXing.BarcodeFormat.CODE_128, ZXing.BarcodeFormat.ITF,
    ZXing.BarcodeFormat.EAN_13, ZXing.BarcodeFormat.EAN_8, ZXing.BarcodeFormat.CODE_39
  ]);
  hints.set(ZXing.DecodeHintType.TRY_HARDER, true);
  const reader = new ZXing.MultiFormatReader();
  reader.setHints(hints);
  zxingReader = reader;
  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d', { willReadFrequently: true });
  let ultimoCodigo = '';
  let contagemVotos = 0;
  const MIN_VOTOS = 3;

  function loop() {
    if (!scannerAtivo || loopPausado) return;
    if (video.readyState === video.HAVE_ENOUGH_DATA) {
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      ctx.drawImage(video, 0, 0);
      try {
        const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const luminance = new ZXing.RGBLuminanceSource(imgData.data, canvas.width, canvas.height);
        const binary = new ZXing.HybridBinarizer(luminance);
        const bitmap = new ZXing.BinaryBitmap(binary);
        const result = reader.decode(bitmap);
        const limpo = result.getText().replace(/\D/g, '');
        if (limpo === cooldownCodigo) { rafId = requestAnimationFrame(loop); return; }
        if (limpo.length >= MIN_LEN) {
          if (limpo === ultimoCodigo) { contagemVotos++; } else { ultimoCodigo = limpo; contagemVotos = 1; }
          cameraHint.textContent = `⬡ ${limpo.length} DÍGITOS · ${contagemVotos}/${MIN_VOTOS}`;
          if (contagemVotos >= MIN_VOTOS) { registrarChave(limpo); retomarLoop(limpo); return; }
        }
      } catch(e) {
        cameraHint.textContent = '⬡ POSICIONE O CÓDIGO DENTRO DA ÁREA';
      }
    }
    rafId = requestAnimationFrame(loop);
  }
  rafId = requestAnimationFrame(loop);
}

// ═══════════════════════
// LEITOR FÍSICO (USB/Bluetooth)
// ═══════════════════════
function capturarTeclaLeitor(e) {
  const agora = Date.now();
  if (agora - ultimoKeyTime > 500 && bufferLeitor.length > 0) bufferLeitor = '';
  ultimoKeyTime = agora;
  if (e.key === 'Backspace') {
    e.preventDefault();
    bufferLeitor = bufferLeitor.slice(0, -1);
    atualizarDisplayLeitor(bufferLeitor);
    clearTimeout(timerLeitor);
    return;
  }
  if (e.key.length !== 1 && e.key !== 'Enter') return;
  if (e.key === 'Enter') {
    e.preventDefault();
    if (bufferLeitor.length >= MIN_LEN) finalizarLeituraLeitor(bufferLeitor);
    return;
  }
  if (/\d/.test(e.key)) { bufferLeitor += e.key; atualizarDisplayLeitor(bufferLeitor); }
  clearTimeout(timerLeitor);
  timerLeitor = setTimeout(() => {
    if (bufferLeitor.length >= MIN_LEN) {
      finalizarLeituraLeitor(bufferLeitor);
    } else if (bufferLeitor.length > 0) {
      barcodeDisplay.value = '';
      barcodeDisplay.placeholder = `⚠ INCOMPLETO: ${bufferLeitor.length} dígitos`;
      setTimeout(() => { bufferLeitor = ''; barcodeDisplay.placeholder = '// AGUARDANDO CÓDIGO //'; }, 2000);
    }
  }, PAUSA_LEITOR);
}

function atualizarDisplayLeitor(codigo) {
  barcodeDisplay.value = codigo.length > 0 ? codigo : '';
  barcodeDisplay.placeholder = codigo.length > 0 ? '' : '// AGUARDANDO CÓDIGO //';
}

function finalizarLeituraLeitor(codigo) {
  const limpo = codigo.replace(/\D/g, '');
  bufferLeitor = '';
  barcodeDisplay.value = '';
  barcodeDisplay.placeholder = '// AGUARDANDO CÓDIGO //';
  if (limpo.length < MIN_LEN) return;
  registrarChave(limpo);
  setTimeout(() => barcodeInput.focus(), 50);
}

barcodeInput.addEventListener('input', function(e) {
  if (!modoLeitor) return;
  const val = e.target.value.replace(/\D/g, '');
  if (val.length > bufferLeitor.length) {
    bufferLeitor = val; atualizarDisplayLeitor(bufferLeitor);
    clearTimeout(timerLeitor);
    timerLeitor = setTimeout(() => {
      if (bufferLeitor.length >= MIN_LEN) finalizarLeituraLeitor(bufferLeitor);
    }, PAUSA_LEITOR);
  }
});

function iniciarLeitorCodigo() {
  modoLeitor = true; bufferLeitor = '';
  barcodeInputContainer.classList.add('show');
  btnEscanear.style.display = 'none';
  btnLeitorCodigo.style.display = 'none';
  barcodeInput.value = '';
  barcodeInput.focus();
}

function pararLeitorCodigo() {
  modoLeitor = false; bufferLeitor = '';
  clearTimeout(timerLeitor);
  barcodeInputContainer.classList.remove('show');
  btnEscanear.style.display = 'flex';
  btnLeitorCodigo.style.display = 'flex';
}

// ═══════════════════════
// REGISTRO + EXIBIÇÃO DA CHAVE (nada é salvo em disco/backend)
// ═══════════════════════
function registrarChave(codigo) {
  const item = { id: Date.now(), codigo, hora: new Date() };
  chavesLidas.unshift(item);
  renderLista();
  if (navigator.vibrate) navigator.vibrate(80);
}

function formatarHora(d) {
  return d.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
}

function renderLista() {
  if (!chavesLidas.length) {
    listaChaves.innerHTML = '<p class="empty-state">// nenhuma chave lida ainda</p>';
    return;
  }
  listaChaves.innerHTML = chavesLidas.map(item => `
    <div class="chave-card" id="card-${item.id}">
      <div class="chave-numero">${item.codigo}</div>
      <div class="chave-meta">
        <span class="chave-len">${item.codigo.length} dígitos ${item.codigo.length === 44 ? '✓' : '⚠ esperado 44'} · ${formatarHora(item.hora)}</span>
        <button class="btn-copiar" onclick="copiarChave('${item.id}','${item.codigo}')">📋 Copiar</button>
      </div>
    </div>`).join('');
}

function copiarChave(id, codigo) {
  navigator.clipboard.writeText(codigo).then(() => {
    const card = document.getElementById('card-' + id);
    const btn = card.querySelector('.btn-copiar');
    card.classList.add('copiado');
    btn.textContent = '✓ Copiado';
    btn.classList.add('ok');
    setTimeout(() => {
      card.classList.remove('copiado');
      btn.textContent = '📋 Copiar';
      btn.classList.remove('ok');
    }, 1500);
  }).catch(() => {
    // Fallback caso clipboard API não esteja disponível
    const ta = document.createElement('textarea');
    ta.value = codigo;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
  });
}
</script>
</body>
</html>
